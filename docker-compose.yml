version: "3.9"

services:
  frontend:
    build: ./frontend
    container_name: historical-battle-frontend
    ports:
      - "5173:5173"
    env_file:
      - .env
    depends_on:
      - agent

  agent:
    build: ./agent
    container_name: historical-battle-agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mcp-server

  mcp-server:
    build: ./mcp-server
    container_name: historical-battle-mcp-server
    ports:
      - "8001:8001"
    env_file:
      - .env
